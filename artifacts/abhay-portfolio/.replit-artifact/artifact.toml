kind = "web"
previewPath = "/"
title = "Abhay Ayare — Portfolio"
version = "1.0.0"
id = "artifacts/abhay-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22710

[services.development]
run = "pnpm --filter @workspace/abhay-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/abhay-portfolio", "run", "build" ]
publicDir = "artifacts/abhay-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22710"
BASE_PATH = "/"
